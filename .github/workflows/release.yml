name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (NSIS + zip)
        run: npm run build -- --win

      - name: Package Chocolatey
        run: choco pack chocolatey/desktoppet.nuspec --output-directory dist/
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DesktopPet ${{ github.ref_name }}"
          body: |
            ## DesktopPet ${{ github.ref_name }}

            ### Windows
            - **安装版 (推荐):** `DesktopPet-Setup-${{ github.ref_name }}.exe` — 安装向导，自动创建桌面快捷方式和开始菜单条目
            - **便携版:** `DesktopPet-${{ github.ref_name }}-win.zip` — 解压即用，无需安装

            ### macOS
            - **DMG:** `DesktopPet-${{ github.ref_name }}-arm64.dmg`

            ### 通过包管理器安装
            - **Windows (Chocolatey):** `choco install desktoppet`
            - **macOS (Homebrew):** `brew tap yangr8640-eng/desktoppet && brew install --cask desktoppet`
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*-win.zip
            dist/*-arm64-mac.zip
            dist/*.dmg
            dist/latest.yml
            dist/latest-mac.yml
            dist/*.nupkg
          draft: false
          prerelease: false
          generateReleaseNotes: true
