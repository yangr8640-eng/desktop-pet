<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <span class="header-icon" id="headerIcon">💠</span>
        <span class="header-title" id="headerTitle">Claude</span>
      </div>
      <div class="header-center">
        <div class="custom-dropdown" id="conversationDropdown">
          <button class="dropdown-toggle" id="dropdownToggle">
            <span class="dropdown-toggle-text">新对话</span>
            <span class="dropdown-arrow">▾</span>
          </button>
          <div class="dropdown-list" id="dropdownList" style="display:none;"></div>
        </div>
      </div>
      <div class="header-right">
        <div class="expression-bar" id="expressionBar" style="display:none;">
          <button class="expr-btn" data-expr="normal" title="默认">😐</button>
          <button class="expr-btn" data-expr="shocked" title="震惊">😱</button>
          <button class="expr-btn" data-expr="mouthOpen" title="张嘴">😮</button>
        </div>
        <button class="header-btn" id="historyBtn" title="历史记录">📋</button>
        <button class="header-btn" id="searchHeaderBtn" title="联网搜索：关">🌐</button>
        <button class="header-btn" id="settingsBtn" title="设置">⚙️</button>
        <button class="header-btn" id="newChatBtn" title="开启新对话">💬</button>
        <button class="header-btn" id="closeBtn" title="关闭">✕</button>
        <button class="header-btn" id="quitBtn" title="退出桌宠">⏻</button>
      </div>
    </div>

    <!-- Settings panel -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-content">
        <div class="api-key-warning" id="apiKeyWarning" style="display:none;">
          <span class="warning-icon">&#9888;&#65039;</span>
          <span class="warning-text" id="warningText"></span>
        </div>
        <!-- AI Model -->
        <div class="settings-section">
          <label class="settings-label">AI 模型</label>
          <select class="settings-input" id="modelSelect"></select>
        </div>
        <div class="settings-section" id="modelConfigSection">
          <div id="modelCustomFields" style="display:none;">
            <label class="settings-label">模型名称</label>
            <input type="text" class="settings-input" id="modelNameInput" placeholder="例如：My GPT">
            <label class="settings-label">API 端点 URL</label>
            <input type="text" class="settings-input" id="modelUrlInput" placeholder="https://api.example.com/v1/chat/completions">
            <label class="settings-label">模型标识</label>
            <input type="text" class="settings-input" id="modelModelIdInput" placeholder="gpt-4o">
          </div>
          <label class="settings-label" id="apiKeyLabel">API Key</label>
          <div class="settings-input-row">
            <input type="password" class="settings-input settings-input-grow" id="apiKeyInput" placeholder="sk-...">
            <button class="settings-save settings-save-small" id="saveKeyBtn">保存</button>
          </div>
          <span class="settings-info" id="modelInfo"></span>
          <span class="settings-validation" id="keyValidation" style="display:none;"></span>
        </div>
        <div class="settings-section">
          <button class="settings-save settings-save-outline" id="addModelBtn">+ 添加自定义模型</button>
          <button class="settings-save settings-save-outline" id="deleteModelBtn" style="display:none;margin-top:6px;">删除此模型</button>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-section">
          <div class="settings-row">
            <span class="settings-row-label">联网搜索</span>
            <label class="toggle-switch">
              <input type="checkbox" id="searchToggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-section">
          <label class="settings-label">宠物外观</label>
          <select class="settings-input" id="themeSelect">
            <option value="orange">🧡 小橘 (橘猫)</option>
            <option value="yellow">💛 小奶娃</option>
            <option value="warrior">⚔️ 极限战士</option>
            <option value="claude">💠 Claude</option>
          </select>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-section">
          <label class="settings-label">个性化语气</label>
          <textarea class="settings-input personality-textarea" id="personalityInput" placeholder="例如：请用霸道总裁的语气说话...&#10;例如：说英文回复我...&#10;例如：更毒舌、更调皮一点..."></textarea>
          <button class="settings-save" id="savePersonalityBtn">保存</button>
        </div>
        <p class="settings-hint">API Key存储在本地，不会上传到任何第三方</p>
      </div>
    </div>

    <!-- History panel -->
    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <span class="history-title">📋 历史记录</span>
        <button class="history-close" id="historyCloseBtn">✕</button>
      </div>
      <div class="history-search">
        <input type="text" class="history-search-input" id="historySearchInput" placeholder="搜索对话...">
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea">
      <div class="welcome-msg">
        <div class="welcome-icon" id="welcomeIcon">💠</div>
        <div class="welcome-text" id="welcomeText">Hello! 我是Claude。💠</div>
        <div class="welcome-sub">有什么我可以帮你的？用代码说话也行，用自然语言聊天也可以~</div>
      </div>
    </div>

    <!-- Input area -->
    <div class="file-preview-area" id="filePreviewArea" style="display:none;">
      <div class="file-preview-list" id="filePreviewList"></div>
    </div>
    <div class="input-area">
      <textarea class="chat-input" id="chatInput" placeholder="跟Claude说点什么..." rows="1"></textarea>
      <button class="import-btn" id="importBtn" title="导入文件">📎</button>
      <button class="send-btn" id="sendBtn" title="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <!-- Resize handles -->
    <div class="resize-handle resize-right" data-resize="e"></div>
    <div class="resize-handle resize-bottom" data-resize="s"></div>
    <div class="resize-handle resize-corner" data-resize="se"></div>

    <!-- Tool confirmation overlay -->
    <div class="tool-confirm-overlay" id="toolConfirmOverlay" style="display:none;">
      <div class="tool-confirm-dialog">
        <div class="tool-confirm-header">🔧 AI 想执行以下操作</div>
        <div class="tool-confirm-toolname" id="confirmToolName"></div>
        <div class="tool-confirm-params" id="confirmToolParams"></div>
        <div class="tool-confirm-actions">
          <button class="tool-confirm-btn tool-confirm-deny" id="confirmDenyBtn">拒绝</button>
          <button class="tool-confirm-btn tool-confirm-allow" id="confirmAllowBtn">允许</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Hidden file input for 📎 button -->
  <input type="file" id="hiddenFileInput" multiple accept=".pdf,.docx,.txt,.md,.json,.csv,.log,.xml,.yaml,.yml,.jpg,.jpeg,.png,.gif,.bmp,.webp,.svg" style="display:none;">

  <!-- Drop zone overlay -->
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-content">
      <div class="drop-icon">📄</div>
      <div class="drop-text">拖放文件到这里</div>
      <div class="drop-sub">支持文档、图片等多种格式，可一次拖入多个</div>
    </div>
  </div>
  <script src="chat.js"></script>
</body>
</html>
