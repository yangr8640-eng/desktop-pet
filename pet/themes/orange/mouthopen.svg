<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Orange tabby desktop pet with open mouth">
  <defs>
    <linearGradient id="headFur" x1="58" y1="24" x2="144" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD47A"/>
      <stop offset="0.48" stop-color="#FF9F3F"/>
      <stop offset="1" stop-color="#E46B22"/>
    </linearGradient>
    <linearGradient id="bodyFur" x1="56" y1="96" x2="145" y2="181" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC46A"/>
      <stop offset="0.58" stop-color="#FF9839"/>
      <stop offset="1" stop-color="#D85E1D"/>
    </linearGradient>
    <linearGradient id="tailFur" x1="137" y1="62" x2="183" y2="139" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD075"/>
      <stop offset="0.5" stop-color="#F18A2D"/>
      <stop offset="1" stop-color="#C95317"/>
    </linearGradient>
    <radialGradient id="muzzleCream" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#FFF1CF"/>
      <stop offset="1" stop-color="#FFD49B"/>
    </radialGradient>
    <linearGradient id="earInner" x1="62" y1="22" x2="82" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB6A0"/>
      <stop offset="1" stop-color="#FFD29A"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#5A2D11" flood-opacity="0.22"/>
    </filter>
  </defs>

  <ellipse cx="101" cy="181" rx="51" ry="9" fill="#4C2A12" opacity="0.13"/>

  <g filter="url(#softShadow)">
    <!-- Curling tail with tabby rings -->
    <path d="M139 139 C162 138 178 123 179 104 C181 82 165 66 149 75 C137 82 139 102 154 107 C164 110 171 103 167 94"
          fill="none" stroke="url(#tailFur)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="none" stroke="#B94B18" stroke-width="3.5" stroke-linecap="round" opacity="0.72">
      <path d="M153 134 C159 131 164 126 167 121"/>
      <path d="M172 112 C174 106 174 100 171 95"/>
      <path d="M158 75 C153 78 150 82 149 87"/>
      <path d="M146 96 C150 101 155 103 161 102"/>
    </g>

    <!-- Body -->
    <path d="M57 140 C57 113 74 94 100 94 C126 94 143 114 144 141 C145 166 126 177 100 177 C74 177 56 165 57 140Z"
          fill="url(#bodyFur)" stroke="#C65B1E" stroke-width="2"/>
    <path d="M74 142 C74 123 85 111 100 111 C115 111 126 124 126 143 C126 160 115 170 100 170 C85 170 74 160 74 142Z"
          fill="url(#muzzleCream)" opacity="0.92"/>
    <g fill="none" stroke="#C85D1B" stroke-width="3" stroke-linecap="round" opacity="0.62">
      <path d="M65 125 C74 120 82 120 88 124"/>
      <path d="M136 125 C127 120 119 120 113 124"/>
      <path d="M66 141 C75 137 82 137 88 140"/>
      <path d="M135 141 C126 137 119 137 112 140"/>
    </g>

    <!-- Lifted paws for the open-mouth expression -->
    <ellipse cx="68" cy="151" rx="13" ry="9" fill="#F68C31" stroke="#C65B1E" stroke-width="1.4" transform="rotate(-22 68 151)"/>
    <ellipse cx="132" cy="151" rx="13" ry="9" fill="#F68C31" stroke="#C65B1E" stroke-width="1.4" transform="rotate(22 132 151)"/>
    <g fill="#FFDCAE" opacity="0.95">
      <circle cx="63" cy="150" r="1.8"/>
      <circle cx="69" cy="148" r="1.8"/>
      <circle cx="74" cy="151" r="1.8"/>
      <circle cx="126" cy="151" r="1.8"/>
      <circle cx="131" cy="148" r="1.8"/>
      <circle cx="137" cy="150" r="1.8"/>
    </g>

    <!-- Ears behind the head -->
    <path d="M66 58 L53 24 C51 18 57 15 62 19 L88 44 Z"
          fill="url(#headFur)" stroke="#C65B1E" stroke-width="2" stroke-linejoin="round"/>
    <path d="M134 58 L147 24 C149 18 143 15 138 19 L112 44 Z"
          fill="url(#headFur)" stroke="#C65B1E" stroke-width="2" stroke-linejoin="round"/>
    <path d="M68 51 L59 27 L81 44 Z" fill="url(#earInner)" opacity="0.95"/>
    <path d="M132 51 L141 27 L119 44 Z" fill="url(#earInner)" opacity="0.95"/>
    <g fill="none" stroke="#B94B18" stroke-width="2.6" stroke-linecap="round" opacity="0.65">
      <path d="M61 28 L70 47"/>
      <path d="M139 28 L130 47"/>
    </g>

    <!-- Head and face -->
    <path d="M60 82 C60 56 77 40 100 40 C124 40 141 56 141 82 C141 108 121 125 100 125 C78 125 60 108 60 82Z"
          fill="url(#headFur)" stroke="#C65B1E" stroke-width="2"/>
    <path d="M77 88 C77 73 88 65 100 65 C112 65 123 73 123 88 C123 106 112 115 100 115 C88 115 77 106 77 88Z"
          fill="url(#muzzleCream)" opacity="0.94"/>

    <!-- Forehead and cheek tabby marks -->
    <g fill="none" stroke="#9E4318" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
      <path d="M87 53 C91 61 95 61 100 54 C105 61 109 61 113 53"/>
      <path d="M93 49 C95 54 97 56 100 58"/>
      <path d="M107 49 C105 54 103 56 100 58"/>
      <path d="M66 78 C73 76 78 73 82 69"/>
      <path d="M67 91 C74 89 79 87 83 84"/>
      <path d="M134 78 C127 76 122 73 118 69"/>
      <path d="M133 91 C126 89 121 87 117 84"/>
    </g>

    <!-- Brighter surprised eyes -->
    <path d="M77 77 C82 69 95 69 100 78 C95 87 82 87 77 77Z"
          fill="#FFF8E8" stroke="#573019" stroke-width="1.4"/>
    <path d="M100 78 C105 69 118 69 123 77 C118 87 105 87 100 78Z"
          fill="#FFF8E8" stroke="#573019" stroke-width="1.4"/>
    <circle cx="88.5" cy="78" r="6" fill="#62B779"/>
    <circle cx="111.5" cy="78" r="6" fill="#62B779"/>
    <ellipse cx="89.5" cy="78" rx="2.7" ry="5.2" fill="#20341D"/>
    <ellipse cx="112.5" cy="78" rx="2.7" ry="5.2" fill="#20341D"/>
    <circle cx="86" cy="74.4" r="2" fill="#FFFFFF"/>
    <circle cx="109" cy="74.4" r="2" fill="#FFFFFF"/>
    <path d="M77 71 C84 66 94 67 100 72" fill="none" stroke="#7E3618" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <path d="M100 72 C106 67 116 66 123 71" fill="none" stroke="#7E3618" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- Open mouth, nose, cheeks, whiskers -->
    <ellipse cx="91" cy="97" rx="13" ry="10" fill="#FFE2AE" opacity="0.95"/>
    <ellipse cx="109" cy="97" rx="13" ry="10" fill="#FFE2AE" opacity="0.95"/>
    <path d="M94 90 C98 87 102 87 106 90 C104 95 96 95 94 90Z" fill="#EA6D61"/>
    <path d="M100 95 L100 99" fill="none" stroke="#55301D" stroke-width="1.6" stroke-linecap="round"/>
    <ellipse cx="100" cy="106" rx="14" ry="15" fill="#241006"/>
    <path d="M89 101 C94 96 106 96 111 101 C108 105 92 105 89 101Z" fill="#4A2114" opacity="0.78"/>
    <ellipse cx="100" cy="114" rx="8.5" ry="5.2" fill="#FF7B86"/>
    <path d="M100 112 C103 112 105 114 106 117" fill="none" stroke="#E75F70" stroke-width="1.1" stroke-linecap="round"/>
    <g fill="#8E4D25" opacity="0.65">
      <circle cx="84" cy="95" r="1.2"/>
      <circle cx="88" cy="100" r="1.1"/>
      <circle cx="116" cy="95" r="1.2"/>
      <circle cx="112" cy="100" r="1.1"/>
    </g>
    <g fill="none" stroke="#74401F" stroke-width="1.35" stroke-linecap="round" opacity="0.78">
      <path d="M75 93 C62 87 52 85 42 86"/>
      <path d="M75 100 C62 100 51 102 42 107"/>
      <path d="M125 93 C138 87 148 85 158 86"/>
      <path d="M125 100 C138 100 149 102 158 107"/>
    </g>

    <!-- Collar and bell -->
    <path d="M74 113 C90 122 110 122 126 113" fill="none" stroke="#2B9A9A" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="100" cy="120" r="5.5" fill="#FFD15B" stroke="#A86611" stroke-width="1.4"/>
    <path d="M96 119 H104" stroke="#A86611" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="100" cy="123" r="1.2" fill="#A86611"/>

    <!-- Grounded back paws -->
    <ellipse cx="75" cy="166" rx="14" ry="8.5" fill="#F68C31" stroke="#C65B1E" stroke-width="1.3"/>
    <ellipse cx="125" cy="166" rx="14" ry="8.5" fill="#F68C31" stroke="#C65B1E" stroke-width="1.3"/>
  </g>
</svg>
