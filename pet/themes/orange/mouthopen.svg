<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Tail curling from right side -->
  <path d="M 148 132 Q 180 120 182 95 Q 184 72 165 68" fill="none" stroke="#E8782A" stroke-width="7" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="100" cy="138" rx="44" ry="36" fill="#FFB347"/>
  <!-- Belly highlight -->
  <ellipse cx="100" cy="142" rx="28" ry="22" fill="#FFD08A"/>

  <!-- Left paw -->
  <ellipse cx="72" cy="168" rx="13" ry="9" fill="#FFB347"/>
  <ellipse cx="72" cy="166" rx="9" ry="5.5" fill="#FFDFB3"/>

  <!-- Right paw -->
  <ellipse cx="128" cy="168" rx="13" ry="9" fill="#FFB347"/>
  <ellipse cx="128" cy="166" rx="9" ry="5.5" fill="#FFDFB3"/>

  <!-- Head -->
  <circle cx="100" cy="82" r="40" fill="#FFB347"/>

  <!-- Left ear -->
  <polygon points="64,52 48,14 82,38" fill="#FFB347"/>
  <polygon points="66,48 55,22 78,40" fill="#FFD08A"/>

  <!-- Right ear -->
  <polygon points="136,52 152,14 118,38" fill="#FFB347"/>
  <polygon points="134,48 145,22 122,40" fill="#FFD08A"/>

  <!-- Face lighter area (shifted up for open mouth) -->
  <ellipse cx="100" cy="82" rx="26" ry="18" fill="#FFD08A"/>

  <!-- Left eye -->
  <circle cx="86" cy="74" r="7" fill="#3D2B1F"/>
  <circle cx="84" cy="71" r="2.8" fill="white"/>
  <circle cx="88" cy="76" r="1.3" fill="white"/>

  <!-- Right eye -->
  <circle cx="114" cy="74" r="7" fill="#3D2B1F"/>
  <circle cx="112" cy="71" r="2.8" fill="white"/>
  <circle cx="116" cy="76" r="1.3" fill="white"/>

  <!-- Nose -->
  <polygon points="96,84 104,84 100,88" fill="#FF7B6C"/>

  <!-- Open mouth - wide dark oval -->
  <ellipse cx="100" cy="103" rx="16" ry="14" fill="#1A0A00"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="109" rx="9" ry="6" fill="#FF6B7A"/>
  <!-- Mouth opening highlight -->
  <ellipse cx="100" cy="97" rx="12" ry="5" fill="#3D2B1F"/>

  <!-- Whiskers left -->
  <g stroke="#E8A45A" stroke-width="1.2" stroke-linecap="round">
    <line x1="68" y1="82" x2="48" y2="78"/>
    <line x1="68" y1="86" x2="48" y2="86"/>
    <line x1="68" y1="90" x2="48" y2="94"/>
  </g>

  <!-- Whiskers right -->
  <g stroke="#E8A45A" stroke-width="1.2" stroke-linecap="round">
    <line x1="132" y1="82" x2="152" y2="78"/>
    <line x1="132" y1="86" x2="152" y2="86"/>
    <line x1="132" y1="90" x2="152" y2="94"/>
  </g>
</svg>
