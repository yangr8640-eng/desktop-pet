    <path d="M101 79 C106 71 118 71 123 78 C118 86 106 86 101 79Z"
          fill="#FFF8E8" stroke="#573019" stroke-width="1.4"/>
    <circle cx="88" cy="79" r="5.7" fill="#62B779"/>
    <circle cx="112" cy="79" r="5.7" fill="#62B779"/>
    <ellipse cx="89" cy="79" rx="2.5" ry="5" fill="#20341D"/>
    <ellipse cx="113" cy="79" rx="2.5" ry="5" fill="#20341D"/>
    <circle cx="85.8" cy="75.8" r="1.9" fill="#FFFFFF"/>
    <circle cx="109.8" cy="75.8" r="1.9" fill="#FFFFFF"/>
    <path d="M77 72 C83 68 93 68 99 72" fill="none" stroke="#7E3618" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <path d="M101 72 C107 68 117 68 123 72" fill="none" stroke="#7E3618" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- Muzzle, nose, smile, whiskers -->
    <ellipse cx="91" cy="97" rx="13" ry="10" fill="#FFE2AE" opacity="0.95"/>
    <ellipse cx="109" cy="97" rx="13" ry="10" fill="#FFE2AE" opacity="0.95"/>
    <path d="M94 91 C98 88 102 88 106 91 C104 96 96 96 94 91Z" fill="#EA6D61"/>
    <path d="M100 96 L100 101" fill="none" stroke="#55301D" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M100 102 C95 107 89 106 87 101" fill="none" stroke="#55301D" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M100 102 C105 107 111 106 113 101" fill="none" stroke="#55301D" stroke-width="1.8" stroke-linecap="round"/>
    <g fill="#8E4D25" opacity="0.65">
      <circle cx="84" cy="95" r="1.2"/>
      <circle cx="88" cy="100" r="1.1"/>
      <circle cx="116" cy="95" r="1.2"/>
      <circle cx="112" cy="100" r="1.1"/>
    </g>
    <g fill="none" stroke="#74401F" stroke-width="1.35" stroke-linecap="round" opacity="0.78">
      <path d="M76 94 C63 89 53 87 43 88"/>
      <path d="M76 100 C62 100 52 102 43 106"/>
      <path d="M124 94 C137 89 147 87 157 88"/>
      <path d="M124 100 C138 100 148 102 157 106"/>
    </g>

    <!-- Collar and bell -->
    <path d="M74 113 C90 122 110 122 126 113" fill="none" stroke="#2B9A9A" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="100" cy="120" r="5.5" fill="#FFD15B" stroke="#A86611" stroke-width="1.4"/>
    <path d="M96 119 H104" stroke="#A86611" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="100" cy="123" r="1.2" fill="#A86611"/>

    <!-- Paws with tiny pads -->
    <ellipse cx="75" cy="165" rx="16" ry="10" fill="#F68C31" stroke="#C65B1E" stroke-width="1.4"/>
    <ellipse cx="125" cy="165" rx="16" ry="10" fill="#F68C31" stroke="#C65B1E" stroke-width="1.4"/>
    <g fill="#FFDCAE" opacity="0.95">
      <ellipse cx="75" cy="166" rx="6.5" ry="3.8"/>
      <circle cx="68" cy="163" r="2"/>
      <circle cx="75" cy="161.8" r="2"/>
      <circle cx="82" cy="163" r="2"/>
      <ellipse cx="125" cy="166" rx="6.5" ry="3.8"/>
      <circle cx="118" cy="163" r="2"/>
      <circle cx="125" cy="161.8" r="2"/>
      <circle cx="132" cy="163" r="2"/>
    </g>
  </g>
</svg>
