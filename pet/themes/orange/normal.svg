    <g fill="none" stroke="#B94B18" stroke-width="3.5" stroke-linecap="round" opacity="0.72">
      <path d="M153 134 C159 131 164 126 167 121"/>
      <path d="M172 112 C174 106 174 100 171 95"/>
      <path d="M158 75 C153 78 150 82 149 87"/>
      <path d="M146 96 C150 101 155 103 161 102"/>
    </g>

    <!-- Body -->
    <path d="M57 140 C57 113 74 94 100 94 C126 94 143 114 144 141 C145 166 126 177 100 177 C74 177 56 165 57 140Z"
          fill="url(#bodyFur)" stroke="#C65B1E" stroke-width="2"/>
    <path d="M74 142 C74 123 85 111 100 111 C115 111 126 124 126 143 C126 160 115 170 100 170 C85 170 74 160 74 142Z"
          fill="url(#muzzleCream)" opacity="0.92"/>
    <g fill="none" stroke="#C85D1B" stroke-width="3" stroke-linecap="round" opacity="0.62">
      <path d="M65 125 C74 120 82 120 88 124"/>
      <path d="M136 125 C127 120 119 120 113 124"/>
      <path d="M66 141 C75 137 82 137 88 140"/>
      <path d="M135 141 C126 137 119 137 112 140"/>
    </g>

    <!-- Ears behind the head -->
    <path d="M66 58 L53 24 C51 18 57 15 62 19 L88 44 Z"
