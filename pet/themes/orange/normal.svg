    <!-- Forehead and cheek tabby marks -->
    <g fill="none" stroke="#9E4318" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
      <path d="M87 53 C91 61 95 61 100 54 C105 61 109 61 113 53"/>
      <path d="M93 49 C95 54 97 56 100 58"/>
      <path d="M107 49 C105 54 103 56 100 58"/>
      <path d="M66 78 C73 76 78 73 82 69"/>
      <path d="M67 91 C74 89 79 87 83 84"/>
      <path d="M134 78 C127 76 122 73 118 69"/>
      <path d="M133 91 C126 89 121 87 117 84"/>
    </g>

    <!-- Eyes -->
    <path d="M77 78 C82 71 94 71 99 79 C94 86 82 86 77 78Z"
