<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    /* Floating animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    /* Blink animation */
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    /* Tail wag */
    @keyframes wag {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(10deg); }
    }
    /* Ear twitch */
    @keyframes earTwitch {
      0%, 100% { transform: rotate(0deg); }
      30% { transform: rotate(-8deg); }
    }
    /* Greeting bounce */
    @keyframes greetBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      30% { transform: translateY(-18px) scale(1.08); }
      50% { transform: translateY(-5px) scale(1.05); }
      70% { transform: translateY(-14px) scale(1.06); }
    }
    /* Speech bubble pop */
    @keyframes bubblePop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    /* Mouth open transition */
    .mouth-normal { transition: all 0.25s ease; }
    .mouth-open-state { transition: all 0.3s ease; }

    .pet-wrapper {
      animation: float 3s ease-in-out infinite;
      cursor: grab;
      position: relative;
      touch-action: none;
    }
    .pet-wrapper:active { cursor: grabbing; }
    .pet-wrapper.greeting { animation: greetBounce 0.7s ease-in-out; }
    .pet-wrapper.dragover { animation: none; transform: scale(1.05); }

    /* Speech bubble */
    .speech-bubble {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: white;
      border-radius: 11px;
      padding: 4px 10px;
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      color: #333;
      white-space: nowrap;
      box-shadow: 0 1px 8px rgba(0,0,0,0.15);
      opacity: 0;
      pointer-events: none;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid white;
    }
    .speech-bubble.show {
      animation: bubblePop 0.3s ease forwards;
      opacity: 1;
    }

    /* Blink overlay */
    .eyes-group .eye-lid {
      transition: transform 0.08s ease;
    }

    /* Mouth */
    #mouth-path {
      transition: d 0.3s ease;
    }

    /* Dragover glow */
    .pet-wrapper.dragover .body-circle {
      filter: drop-shadow(0 0 12px rgba(255, 165, 0, 0.6));
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pet-wrapper" id="petWrapper">
      <!-- Speech bubble -->
      <div class="speech-bubble" id="speechBubble">嗨~ 🐾</div>

      <svg width="147" height="147" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bodyGrad" cx="40%" cy="35%">
            <stop offset="0%" stop-color="#FFB347"/>
            <stop offset="100%" stop-color="#E8782A"/>
          </radialGradient>
          <radialGradient id="bellyGrad" cx="50%" cy="40%">
            <stop offset="0%" stop-color="#FFF5E6"/>
            <stop offset="100%" stop-color="#FFE0B2"/>
          </radialGradient>
        </defs>

        <!-- Tail -->
        <g transform="translate(155, 100)">
          <g style="transform-origin: 0px 6px; animation: wag 1.5s ease-in-out infinite;">
            <path d="M 0 6 Q 38 -10 48 6" fill="none" stroke="#E8782A" stroke-width="12" stroke-linecap="round"/>
            <circle cx="48" cy="6" r="7" fill="#FFB347"/>
          </g>
        </g>

        <!-- Body -->
        <circle class="body-circle" cx="105" cy="110" r="58" fill="url(#bodyGrad)"/>

        <!-- Belly -->
        <ellipse cx="105" cy="118" rx="38" ry="35" fill="url(#bellyGrad)" opacity="0.5"/>

        <!-- Left ear -->
        <g style="transform-origin: 60px 55px;">
          <polygon points="60,58 48,22 80,42" fill="#E8782A" stroke="#D0651E" stroke-width="1"/>
          <polygon points="62,54 53,32 76,46" fill="#FFB3B3" opacity="0.7"/>
        </g>

        <!-- Right ear -->
        <g>
          <polygon points="150,58 162,22 130,42" fill="#E8782A" stroke="#D0651E" stroke-width="1"/>
          <polygon points="148,54 157,32 134,46" fill="#FFB3B3" opacity="0.7"/>
        </g>

        <!-- Face markings (stripes) -->
        <path d="M 90 48 Q 105 55 120 48" fill="none" stroke="#D0651E" stroke-width="2" opacity="0.5"/>

        <!-- Left eye -->
        <g class="eyes-group">
          <ellipse cx="84" cy="98" rx="13" ry="15" fill="white"/>
          <ellipse cx="86" cy="98" rx="7" ry="8" fill="#2C1810"/>
          <circle cx="89" cy="94" r="2.5" fill="white"/>
        </g>

        <!-- Right eye -->
        <g class="eyes-group">
          <ellipse cx="126" cy="98" rx="13" ry="15" fill="white"/>
          <ellipse cx="128" cy="98" rx="7" ry="8" fill="#2C1810"/>
          <circle cx="131" cy="94" r="2.5" fill="white"/>
        </g>

        <!-- Nose -->
        <polygon points="105,111 100,117 110,117" fill="#FF8C8C"/>

        <!-- Mouth (W-shaped smile, animatable) -->
        <path id="mouth-path" class="mouth-normal"
              d="M 90 120 Q 97 128 105 120 Q 113 128 120 120"
              fill="none" stroke="#2C1810" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Whiskers left -->
        <line x1="58" y1="110" x2="82" y2="114" stroke="#2C1810" stroke-width="1.2" opacity="0.6"/>
        <line x1="58" y1="118" x2="82" y2="118" stroke="#2C1810" stroke-width="1.2" opacity="0.6"/>

        <!-- Whiskers right -->
        <line x1="152" y1="110" x2="128" y2="114" stroke="#2C1810" stroke-width="1.2" opacity="0.6"/>
        <line x1="152" y1="118" x2="128" y2="118" stroke="#2C1810" stroke-width="1.2" opacity="0.6"/>

        <!-- Left paw -->
        <ellipse cx="78" cy="155" rx="16" ry="11" fill="#FFB347"/>
        <circle cx="70" cy="152" r="4" fill="#FFD4A8" opacity="0.6"/>
        <circle cx="78" cy="150" r="4" fill="#FFD4A8" opacity="0.6"/>
        <circle cx="86" cy="152" r="4" fill="#FFD4A8" opacity="0.6"/>

        <!-- Right paw -->
        <ellipse cx="132" cy="155" rx="16" ry="11" fill="#FFB347"/>
        <circle cx="124" cy="152" r="4" fill="#FFD4A8" opacity="0.6"/>
        <circle cx="132" cy="150" r="4" fill="#FFD4A8" opacity="0.6"/>
        <circle cx="140" cy="152" r="4" fill="#FFD4A8" opacity="0.6"/>

        <!-- Blush -->
        <ellipse cx="68" cy="112" rx="8" ry="5" fill="#FF9999" opacity="0.4"/>
        <ellipse cx="142" cy="112" rx="8" ry="5" fill="#FF9999" opacity="0.4"/>
      </svg>
    </div>
  </div>
  <script src="pet.js"></script>
</body>
</html>
