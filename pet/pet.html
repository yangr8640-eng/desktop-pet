<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes greetBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      30% { transform: translateY(-16px) scale(1.06); }
      50% { transform: translateY(-4px) scale(1.04); }
      70% { transform: translateY(-12px) scale(1.05); }
    }
    @keyframes bubblePop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .pet-wrapper {
      animation: float 3s ease-in-out infinite;
      position: relative;
      touch-action: none;
      pointer-events: none;
    }
    .cat-interactive {
      pointer-events: auto;
      cursor: grab;
    }
    .pet-wrapper.greeting { animation: greetBounce 0.7s ease-in-out; }
    .pet-wrapper.dragover { animation: none; transform: scale(1.05); }

    /* Pet image (single dynamic SVG for multi-expression support) */
    .pet-img {
      width: 128px;
      height: auto;
      display: block;
      image-rendering: auto;
    }

    /* Speech bubble */
    .speech-bubble {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: white;
      border-radius: 10px;
      padding: 4px 10px;
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #333;
      white-space: normal;
      max-width: 180px;
      text-align: center;
      box-shadow: 0 1px 8px rgba(0,0,0,0.15);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid white;
    }
    .speech-bubble.show {
      animation: bubblePop 0.3s ease forwards;
      opacity: 1;
    }

    /* Cyber/code style speech bubble */
    .speech-bubble.cyber {
      background: #0d1117;
      color: #58a6ff;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 11px;
      border: 0.5px solid rgba(88, 166, 255, 0.3);
      box-shadow: 0 1px 12px rgba(88, 166, 255, 0.15);
      border-radius: 8px;
    }
    .speech-bubble.cyber::after {
      border-top-color: #0d1117;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pet-wrapper" id="petWrapper">
      <div class="speech-bubble" id="speechBubble">嗨~ 💛</div>
      <div class="cat-interactive">
        <img src="themes/claude/normal.svg" class="pet-img" id="petImg" alt="pet" draggable="false" />
      </div>
    </div>
  </div>
  <script src="pet.js"></script>
</body>
</html>
